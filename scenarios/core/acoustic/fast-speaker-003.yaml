id: acoustic-fast-003
version: 1
mode: scripted
description: Very fast speaker pacing
tags: [robustness, speed, acoustic]

persona:
  accent: en-US
  speaking_speed: 1.5
  background_noise: clean

conversation:
  - role: caller
    text: "Hey I need to quickly update my shipping address to 123 Oak Street apartment 4B"
  - role: agent
    expect:
      intent: address_update
      max_latency_ms: 5000

success_criteria:
  - type: task_completion
    description: "Agent keeps up with fast speech"
