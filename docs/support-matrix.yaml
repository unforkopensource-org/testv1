dashboard:
  failure_workbench:
    status: shipped
    notes: >-
      Vue 3 + TypeScript + Vite + Tailwind + Vue Router + TanStack Query +
      Apache ECharts. Failure inbox is the landing screen; call detail
      surfaces transcript + spans + metrics + regression action; evaluation
      detail surfaces metric breakdown + failure list. Source lives in
      dashboard/, builds into src/decibench/api/static/, and is served by
      `decibench serve` with no Node required at install time.

