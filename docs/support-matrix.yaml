# Decibench Support Matrix — single source of truth
#
# Status legend (per plan.md Track 3 truth model):
#   shipped       — code exists, works end to end, covered by tests/release smoke
#   beta          — usable but with known limits, documented
#   experimental  — code exists but should not be sold as reliable
#   planned       — not shipped yet
#
# When you change a connector/importer/UI status here, update README + /docs to
# match. CI's docs-validation step uses this file as the canonical answer.

version: 2
updated: "2026-04-16"

connectors:
  demo:
    target_uri: demo://
    status: shipped
    notes: "Built-in echo agent. Zero config, used for the 30-second quickstart."
  websocket:
    target_uri: ws://host:port/path
    status: shipped
    notes: "Generic WebSocket connector for any agent that speaks PCM16 over WS."
  process:
    target_uri: 'exec:"command"'
    status: shipped
    notes: "Spawn a local process; pipe PCM via stdin/stdout."
  http:
    target_uri: http://host/endpoint
    status: shipped
    notes: "Batch / non-realtime agents."
  retell:
    target_uri: retell://agent_id
    status: experimental
    notes: >-
      Native Retell connector requires WebRTC media bridging via the
      Decibench Bridge sidecar. The protocol contract is shipped, but the
      end-to-end browser bridge is in progress. Use ws:// for a real
      Retell WebSocket endpoint until this lands.
  vapi:
    target_uri: vapi://agent_id
    status: experimental
    notes: >-
      Same as Retell — Vapi web calls run on Daily.co WebRTC and need the
      sidecar bridge. Use ws:// for raw Vapi WebSocket endpoints today.
  livekit:
    status: planned
    notes: "Planned. Will build on the same sidecar bridge."
  elevenlabs:
    status: planned
  bland:
    status: planned
  sip:
    status: planned
    notes: "PSTN/SIP infrastructure is intentionally BYO Twilio/Vonage."
  pstn:
    status: planned
    notes: "BYO Twilio/Vonage credentials path planned."

