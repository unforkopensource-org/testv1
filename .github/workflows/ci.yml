name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
          pip install build

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/decibench/ --config-file pyproject.toml

      - name: Run unit tests
        run: pytest tests/ -x -q --timeout=120

      - name: Run demo suite (integration)
        run: |
          decibench run --target demo --suite quick --format ci --exit-code-on-fail

      - name: Build package
        run: python -m build

      - name: Smoke test package install
        run: |
          # Test installation outside source tree
          python -m venv /tmp/smoke-env
          source /tmp/smoke-env/bin/activate
          pip install dist/*.whl
          cd /tmp
          decibench --help
